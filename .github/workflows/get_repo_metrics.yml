name: Get Metrics JSON File
on: [push]
jobs:
    get-metric-job:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Generate JSON File with Repo Data Metric
              run: | 
                echo "### Count: Stargazer###"
                gh repo view DesignLiquido/delegua --json stargazerCount > stargazerCount.json
                cat stargazerCount.json

                echo "### Count: Watchers ###"
                gh repo view DesignLiquido/delegua --json watchers > watchersCount.json
                cat watchersCount.json

                echo "### Count: Fork ###"
                gh repo view DesignLiquido/delegua --json forkCount > forkCount.json
                cat forkCount.json

                echo "### Last release ###"
                gh release view --repo DesignLiquido/delegua --json name,tagName,publishedAt,url > lastReleaseData.json
                cat lastReleaseData.json

                echo "### Contributors Count ###"
                gh api repos/DesignLiquido/delegua/contributors --paginate | jq length > contriburosCount.json
                cat contriburosCount.json

                echo "### Issues Count - OPEN ###"
                gh api 'search/issues?q=repo:DesignLiquido/delegua+is:issue+is:open' --jq '.total_count' > openIssuesCount.json
                cat openIssuesCount.json

                echo "### Issues Count - CLOSED ###"
                gh api 'search/issues?q=repo:DesignLiquido/delegua+is:issue+is:closed' --jq '.total_count' > closedIssuesCount.json
                cat closedIssuesCount.json

                echo "### PR Count - OPEN ###"
                gh api 'search/issues?q=repo:DesignLiquido/delegua+is:pr+is:open' --jq '.total_count' > openPRsCount.json
                cat openPRsCount.json

                echo "### PR Count - CLOSED ###"
                gh api 'search/issues?q=repo:DesignLiquido/delegua+is:pr+is:closed' --jq '.total_count' > closedPRsCount.json
                cat closedPRsCount.json

                echo "### Community Standards ###"
                gh api repos/DesignLiquido/delegua/community/profile) > communityStandards.json
                cat communityStandards.json
                gh repo view DesignLiquido/delegua --json isSecurityPolicyEnabled > security.json
                cat security.json

              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}